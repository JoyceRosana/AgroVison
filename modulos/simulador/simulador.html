<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Rural</title>

<link rel="stylesheet" href="simulador.css">
</head>
<body>

<div class="viewport">

    <div class="world">

        <img src="/img/simulador/mapa.png" class="mapa">

        <!-- OBJETOS -->

        <img src="/img/simulador/galpao.png" class="objeto galpao">

        <img src="/img/simulador/cisterna.png" class="objeto cisterna">

        <img src="/img/simulador/cooperativa.png" class="objeto cooperativa">

        <!-- ÁREA DE CULTIVO -->

        <div id="plantacao" class="plantacao"></div>

    </div>

</div>

<!-- MENU -->

<div id="menuPlantio" class="menu-plantio oculto">

    <button data-cultura="milho">🌽 Milho</button>

    <button data-cultura="soja">🌱 Soja</button>

    <button data-cultura="alface">🥬 Alface</button>

    <button data-cultura="cenoura">🥕 Cenoura</button>

    <button data-cultura="tomate">🍅 Tomate</button>

</div>

<!-- CURSORES -->

<img id="cursorPlantio"
src="/img/simulador/maozinha.png"
class="cursor oculto">

<img id="cursorFoice"
src="/img/simulador/foice.png"
class="cursor oculto">

<script src="simulador.js"></script>

</body>
</html>
