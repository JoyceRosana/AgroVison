<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Rural</title>

    <link rel="stylesheet" href="simulador.css">
</head>
<body>

    <div class="viewport">

        <div class="world">

            <img src="/img/simulador/mapa.png" class="mapa">

            <!-- OBJETOS -->

            <img src="/img/simulador/galpao.png" class="objeto galpao">

            <img src="/img/simulador/cisterna.png" class="objeto cisterna">

            <img src="/img/simulador/cooperativa.png" class="objeto cooperativa">
            <div id="plantacao" class="plantacao"></div>

        </div>

    </div>

    <div id="menuPlantio" class="menu-plantio oculto">

    <img
        src="/img/simulador/balao-madeira.png"
        class="balao-img"
        alt="Menu de culturas"
    >

    <button class="opcao alface" data-cultura="alface">🥬</button>

    <button class="opcao tomate" data-cultura="tomate">🍅</button>

    <button class="opcao cenoura" data-cultura="cenoura">🥕</button>

    <button class="opcao milho" data-cultura="milho">🌽</button>

    <button class="opcao soja" data-cultura="soja">🌱</button>

</div>

</div>

    <script src="simulador.js"></script>

</body>
</html>
